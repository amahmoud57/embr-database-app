platform: nodejs
platformVersion: "20"
autoDeploy: true

run:
  port: 3000
  startCommand: node server/index.js

dependencies:
  - name: db
    type: postgres
    required: true
    provides:
      - name: DATABASE_URL
        secret: true
    database:
      migrate: "psql \"$DATABASE_URL\" -f db/schema.sql"
      seed: "psql \"$DATABASE_URL\" -f db/seed.sql"

static:
  spaFallback: true
  headers:
    "*.js": "public, max-age=31536000, immutable"
    "*.css": "public, max-age=31536000, immutable"

healthCheck:
  path: /health
